<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>PriceSentry — Dashboard Variations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/tokens.css">
<style>
  body { background: #F3F4F6; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared/icons.jsx"></script>
<script type="text/babel" src="shared/data.jsx"></script>
<script type="text/babel" src="shared/chrome.jsx"></script>
<script type="text/babel" src="variations/A_classic.jsx"></script>
<script type="text/babel" src="variations/B_triage.jsx"></script>
<script type="text/babel" src="variations/C_compare.jsx"></script>
<script type="text/babel" src="variations/D_command.jsx"></script>
<script type="text/babel" src="variations/E_dense.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => (
  <DesignCanvas
    title="PriceSentry — Dashboard Variations"
    subtitle="ダッシュボード画面の方向性を4案探索 · 既存のデザインシステム（Inter / Navy + Blue / professional・data-focused）に準拠"
  >
    <DCSection id="dashboards-refined" title="Refined — A×Dハイブリッド（推奨）">
      <DCArtboard
        id="E"
        label="E. Dense Classic — Aの色/レイアウト × Dの情報密度"
        width={1440}
        height={820}
      >
        <VariationE/>
      </DCArtboard>
    </DCSection>

    <DCSection id="dashboards" title="Dashboard — 4 Directions（参考）">
      <DCArtboard
        id="A"
        label="A. Classic Data Table — 既存路線を洗練"
        width={1440}
        height={900}
      >
        <VariationA/>
      </DCArtboard>

      <DCArtboard
        id="B"
        label="B. Triage / Card-Forward — 承認・例外を最優先"
        width={1440}
        height={1080}
      >
        <VariationB/>
      </DCArtboard>

      <DCArtboard
        id="C"
        label="C. Split Compare — 自分 vs ライバルの比較軸"
        width={1440}
        height={950}
      >
        <VariationC/>
      </DCArtboard>

      <DCArtboard
        id="D"
        label="D. Command Center — 高密度オペレーションUI"
        width={1440}
        height={900}
      >
        <VariationD/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
